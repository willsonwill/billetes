<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Serie-BOL OCR</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        background: #060b14;
        color: #fff;
        font-family: "Rajdhani", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 14px 14px 40px;
        gap: 12px;
      }
      h1 {
        font-family: "Orbitron", sans-serif;
        font-size: 15px;
        letter-spacing: 3px;
        color: #7aaed0;
        margin-top: 4px;
      }
      .sub {
        font-size: 10px;
        letter-spacing: 2px;
        color: #1e3a58;
        text-transform: uppercase;
        margin-top: -6px;
      }

      /* CAMERA */
      .cam-wrap {
        position: relative;
        width: 100%;
        max-width: 440px;
        border-radius: 16px;
        overflow: hidden;
        border: 2px solid #1a3050;
        background: #000;
        aspect-ratio: 4/3;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      canvas {
        display: none;
      }

      /* ROI green box */
      .roi {
        position: absolute;
        left: 5%;
        right: 5%;
        top: 28%;
        bottom: 28%;
        border: 3px solid #00e676;
        border-radius: 8px;
        box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.5);
        pointer-events: none;
      }
      .roi-lbl {
        position: absolute;
        bottom: -22px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 10px;
        letter-spacing: 2px;
        color: #00e676;
        white-space: nowrap;
        text-transform: uppercase;
        font-family: "Rajdhani", sans-serif;
        text-shadow: 0 0 8px rgba(0, 230, 118, 0.7);
      }
      .sline {
        position: absolute;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, #00e676, transparent);
        box-shadow: 0 0 8px #00e676;
        pointer-events: none;
        animation: sw 1.5s ease-in-out infinite;
      }
      @keyframes sw {
        0% {
          top: 4%;
        }
        100% {
          top: 96%;
        }
      }

      .ph {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .ph .ico {
        font-size: 42px;
      }
      .ph p {
        font-size: 12px;
        letter-spacing: 1px;
        text-align: center;
        color: #2a4a68;
      }

      /* STATUS */
      .status {
        font-size: 11px;
        letter-spacing: 2px;
        color: #2e5070;
        text-transform: uppercase;
        text-align: center;
        min-height: 18px;
      }
      .status.loading {
        color: #ffd600;
        animation: bl 0.7s infinite;
      }
      .status.ready {
        color: #00e676;
      }
      .status.err {
        color: #ff4060;
      }
      @keyframes bl {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* BUTTONS */
      .btn-cam {
        width: 100%;
        max-width: 440px;
        padding: 15px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, #005530, #00a86b);
        color: #fff;
        font-family: "Rajdhani", sans-serif;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 2px;
        box-shadow: 0 4px 18px rgba(0, 168, 107, 0.4);
        transition: all 0.15s;
      }
      .btn-cam:active {
        transform: scale(0.97);
      }

      .btn-cap {
        width: 100%;
        max-width: 440px;
        padding: 20px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, #003eaa, #0062f0);
        color: #fff;
        font-family: "Orbitron", sans-serif;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 3px;
        box-shadow: 0 6px 28px rgba(0, 60, 180, 0.5);
        transition: all 0.15s;
        display: none;
      }
      .btn-cap:active {
        transform: scale(0.97);
      }
      .btn-cap:disabled {
        background: #0d1828;
        color: #1a3050;
        box-shadow: none;
        cursor: not-allowed;
      }

      /* RESULT */
      .result {
        width: 100%;
        max-width: 440px;
        background: #0a1828;
        border: 2px solid #152540;
        border-radius: 16px;
        padding: 18px 16px;
        text-align: center;
        transition: all 0.4s;
      }
      .result.found {
        border-color: #00e676;
        box-shadow: 0 0 36px rgba(0, 230, 118, 0.18);
      }
      .result.error {
        border-color: #ff4060;
        box-shadow: 0 0 24px rgba(255, 64, 96, 0.12);
      }

      .result-lbl {
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #2e5070;
        margin-bottom: 10px;
      }

      .number {
        font-family: "Share Tech Mono", monospace;
        font-size: 36px;
        letter-spacing: 5px;
        color: #1a3050;
        min-height: 54px;
        display: flex;
        align-items: center;
        justify-content: center;
        word-break: break-all;
        transition: all 0.3s;
        line-height: 1.2;
      }
      .number.show {
        color: #00e676;
        text-shadow: 0 0 30px rgba(0, 230, 118, 0.9);
        animation: pop 0.35s ease;
      }
      .number.err {
        color: #ff4060;
        font-size: 16px;
        letter-spacing: 1px;
        font-family: "Rajdhani", sans-serif;
      }
      @keyframes pop {
        0% {
          transform: scale(0.8);
        }
        60% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }

      /* SPINNER */
      .spinner {
        width: 30px;
        height: 30px;
        border: 3px solid #1a3050;
        border-top-color: #0062f0;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin: 0 auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* HISTORY */
      .hist-title {
        width: 100%;
        max-width: 440px;
        font-size: 10px;
        letter-spacing: 3px;
        color: #1e3a58;
        text-transform: uppercase;
      }
      .hist-list {
        width: 100%;
        max-width: 440px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 220px;
        overflow-y: auto;
      }
      .hist-item {
        background: #0a1828;
        border: 1px solid #152540;
        border-radius: 10px;
        padding: 11px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        animation: fi 0.2s ease;
      }
      @keyframes fi {
        from {
          opacity: 0;
          transform: translateX(-8px);
        }
        to {
          opacity: 1;
        }
      }
      .hist-n {
        font-family: "Share Tech Mono", monospace;
        font-size: 17px;
        letter-spacing: 3px;
        color: #90c0e8;
      }
      .hist-t {
        font-size: 10px;
        color: #1e3a58;
        letter-spacing: 1px;
      }
      .hist-empty {
        font-size: 11px;
        color: #1a3050;
        letter-spacing: 1px;
        text-align: center;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <h1>🇧🇴 SERIE-BOL OCR</h1>
    <div class="sub">OCR.Space API · Gratis · Sin registro</div>

    <!-- CAMERA -->
    <div class="cam-wrap" id="camWrap">
      <div class="ph" id="ph">
        <div class="ico">📷</div>
        <p>Toca "Abrir Cámara"<br />y apunta al número de serie</p>
      </div>
      <video id="vid" autoplay playsinline muted style="display: none"></video>
      <canvas id="cap"></canvas>
      <div class="roi" id="roi" style="display: none">
        <div class="sline"></div>
        <div class="roi-lbl">número de serie aquí</div>
      </div>
    </div>

    <div class="status" id="status">Listo para iniciar</div>

    <button class="btn-cam" id="btnCam" onclick="startCam()">
      📷 Abrir Cámara
    </button>
    <button class="btn-cap" id="btnCap" onclick="capturar()">
      📸 SACAR NÚMERO
    </button>

    <!-- RESULT -->
    <div class="result" id="result">
      <div class="result-lbl">Número de serie</div>
      <div class="number" id="numOut">—</div>
    </div>

    <!-- HISTORY -->
    <div class="hist-title">Últimas lecturas</div>
    <div class="hist-list" id="histList">
      <div class="hist-empty">Sin lecturas aún</div>
    </div>

    <script>
      let stream = null;

      // OCR.Space free key — funciona sin registro
      // Límite: 500 requests/día gratis
      const OCR_KEY = "helloworld";

      /* ── CAMERA ── */
      async function startCam() {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1920 },
              height: { ideal: 1080 },
            },
          });
          const v = g("vid");
          v.srcObject = stream;
          v.style.display = "block";
          g("ph").style.display = "none";
          g("roi").style.display = "block";
          g("btnCam").style.display = "none";
          g("btnCap").style.display = "block";
          setStatus("ready", "Centra el número y toca el botón");
        } catch (e) {
          setStatus("err", "Error cámara: " + e.message);
        }
      }

      /* ── CAPTURAR ── */
      async function capturar() {
        const vid = g("vid");
        if (!vid.videoWidth) {
          setStatus("err", "Cámara no lista");
          return;
        }

        g("btnCap").disabled = true;
        setStatus("loading", "Leyendo número...");
        g("result").className = "result";
        g("numOut").innerHTML = '<div class="spinner"></div>';

        try {
          const W = vid.videoWidth,
            H = vid.videoHeight;

          // Crop the green ROI zone
          const sx = Math.round(W * 0.05),
            sy = Math.round(H * 0.28);
          const sw = Math.round(W * 0.9),
            sh = Math.round(H * 0.44);

          const c = document.createElement("canvas");
          c.width = sw;
          c.height = sh;
          c.getContext("2d").drawImage(vid, sx, sy, sw, sh, 0, 0, sw, sh);

          // Convert to base64
          const base64 = c.toDataURL("image/jpeg", 0.95).split(",")[1];

          // Send to OCR.Space
          const serial = await ocrSpace(base64);

          if (serial) {
            const out = g("numOut");
            out.textContent = serial;
            out.className = "number show";
            setTimeout(() => out.classList.remove("show"), 500);
            g("result").className = "result found";
            addHistory(serial);
            setStatus("ready", "✅ Listo — toca de nuevo para otro billete");
          } else {
            g("numOut").className = "number err";
            g("numOut").textContent = "No detectado — intenta de nuevo";
            g("result").className = "result error";
            setStatus("err", "Acerca más el billete y reintenta");
          }
        } catch (e) {
          g("numOut").className = "number err";
          g("numOut").textContent = "Error de conexión";
          g("result").className = "result error";
          setStatus("err", e.message);
          console.error(e);
        }

        g("btnCap").disabled = false;
      }

      /* ── OCR.SPACE API ── */
      async function ocrSpace(base64) {
        const formData = new FormData();
        formData.append("base64Image", "data:image/jpeg;base64," + base64);
        formData.append("apikey", OCR_KEY);
        formData.append("language", "eng");
        formData.append("isOverlayRequired", "false");
        formData.append("detectOrientation", "true");
        formData.append("scale", "true"); // auto-scale for better accuracy
        formData.append("OCREngine", "2"); // Engine 2 = more accurate

        const res = await fetch("https://api.ocr.space/parse/image", {
          method: "POST",
          body: formData,
        });

        if (!res.ok) throw new Error("OCR API error " + res.status);

        const data = await res.json();

        if (data.IsErroredOnProcessing) {
          throw new Error(data.ErrorMessage?.[0] || "OCR error");
        }

        const raw = data.ParsedResults?.[0]?.ParsedText || "";
        console.log("OCR raw:", raw);

        return extractSerial(raw);
      }

      /* ── EXTRACT SERIAL ── */
      function extractSerial(raw) {
        if (!raw) return "";
        // Clean: keep only letters, digits, spaces
        const s = raw
          .toUpperCase()
          .replace(/[^A-Z0-9\s]/g, " ")
          .replace(/\s+/g, " ")
          .trim();

        // Bolivian bill formats:
        // 2266791860 A  →  digits (8-11) + optional space + letter
        // A 2266791860  →  letter + optional space + digits
        const tests = [
          /(\d{8,11})\s*([A-Z])\b/, // 2266791860A  ← formato principal
          /\b([A-Z])\s*(\d{8,11})/, // A2266791860
          /\b[A-Z]{1,2}\d{6,10}\b/, // AB123456
          /\b\d{7,11}\b/, // solo dígitos
        ];

        for (const re of tests) {
          const m = s.match(re);
          if (!m) continue;
          if (m[2] !== undefined) {
            const a = m[1],
              b = m[2];
            if (/^[A-Z]$/.test(b)) return a + b; // 2266791860A
            if (/^[A-Z]$/.test(a)) return a + b; // A2266791860
          }
          return m[0].replace(/\s/g, "");
        }
        return "";
      }

      /* ── HISTORY ── */
      function addHistory(serial) {
        const list = g("histList");
        if (list.querySelector(".hist-empty")) list.innerHTML = "";
        const d = document.createElement("div");
        d.className = "hist-item";
        d.innerHTML = `<span class="hist-n">${serial}</span><span class="hist-t">${new Date().toLocaleTimeString("es-BO")}</span>`;
        list.prepend(d);
      }

      function setStatus(cls, txt) {
        const s = g("status");
        s.className = "status" + (cls ? " " + cls : "");
        s.textContent = txt;
      }

      function g(id) {
        return document.getElementById(id);
      }
    </script>
  </body>
</html>
