<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Serie-BOL</title>
    <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #060b14;
        color: #fff;
        font-family: "Rajdhani", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px;
        gap: 14px;
      }

      h1 {
        font-family: "Orbitron", sans-serif;
        font-size: 16px;
        letter-spacing: 3px;
        color: #aac4e0;
        margin-top: 4px;
      }

      /* VIDEO */
      .cam-wrap {
        position: relative;
        width: 100%;
        max-width: 440px;
        border-radius: 16px;
        overflow: hidden;
        border: 2px solid #1a3050;
        background: #000;
        aspect-ratio: 4/3;
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      canvas {
        display: none;
      }

      /* green box guide */
      .box {
        position: absolute;
        left: 5%;
        right: 5%;
        top: 30%;
        bottom: 30%;
        border: 3px solid #00e676;
        border-radius: 8px;
        box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.45);
        pointer-events: none;
      }
      .box-lbl {
        position: absolute;
        top: 100%;
        margin-top: 8px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        letter-spacing: 2px;
        color: #00e676;
        white-space: nowrap;
        text-transform: uppercase;
        font-family: "Rajdhani", sans-serif;
        text-shadow: 0 0 8px #00e676;
      }
      /* scan line inside box */
      .sline {
        position: absolute;
        left: 0;
        right: 0;
        height: 2px;
        top: 0;
        background: linear-gradient(90deg, transparent, #00e676, transparent);
        box-shadow: 0 0 8px #00e676;
        animation: sw 1.5s ease-in-out infinite;
      }
      @keyframes sw {
        0% {
          top: 5%;
        }
        100% {
          top: 95%;
        }
      }

      /* placeholder */
      .ph {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: #2a4a68;
      }
      .ph .ico {
        font-size: 48px;
      }
      .ph p {
        font-size: 13px;
        letter-spacing: 1px;
        text-align: center;
      }

      /* BUTTON */
      .btn-cap {
        width: 100%;
        max-width: 440px;
        padding: 18px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, #0040bb, #0068f0);
        color: #fff;
        font-family: "Orbitron", sans-serif;
        font-size: 16px;
        font-weight: 900;
        letter-spacing: 3px;
        box-shadow: 0 6px 24px rgba(0, 60, 180, 0.5);
        transition: all 0.15s;
      }
      .btn-cap:active {
        transform: scale(0.97);
      }
      .btn-cap:disabled {
        background: #111d30;
        color: #2a4060;
        box-shadow: none;
        cursor: not-allowed;
      }

      .btn-start {
        width: 100%;
        max-width: 440px;
        padding: 14px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, #005530, #00a86b);
        color: #fff;
        font-family: "Rajdhani", sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 2px;
        box-shadow: 0 4px 18px rgba(0, 168, 107, 0.4);
        transition: all 0.15s;
      }
      .btn-start:active {
        transform: scale(0.97);
      }

      /* STATUS */
      .status {
        font-size: 12px;
        letter-spacing: 2px;
        color: #2e5070;
        text-transform: uppercase;
        text-align: center;
      }
      .status.loading {
        color: #ffd600;
      }
      .status.ready {
        color: #00e676;
      }
      .status.scanning {
        color: #ffd600;
        animation: bl 0.6s infinite;
      }
      @keyframes bl {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* RESULT — big number */
      .result-wrap {
        width: 100%;
        max-width: 440px;
        background: #0a1828;
        border: 2px solid #1a3050;
        border-radius: 16px;
        padding: 20px 16px;
        text-align: center;
        transition: all 0.4s;
      }
      .result-wrap.found {
        border-color: #00e676;
        box-shadow: 0 0 32px rgba(0, 230, 118, 0.15);
      }

      .result-label {
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #2e5070;
        margin-bottom: 10px;
      }

      .number {
        font-family: "Share Tech Mono", monospace;
        font-size: 36px;
        letter-spacing: 6px;
        color: #1a3050;
        min-height: 54px;
        display: flex;
        align-items: center;
        justify-content: center;
        word-break: break-all;
        transition: all 0.3s;
      }
      .number.show {
        color: #00e676;
        text-shadow: 0 0 28px rgba(0, 230, 118, 0.8);
        animation: pop 0.35s ease;
      }
      @keyframes pop {
        0% {
          transform: scale(0.8);
        }
        60% {
          transform: scale(1.08);
        }
        100% {
          transform: scale(1);
        }
      }

      /* HISTORY */
      .hist-wrap {
        width: 100%;
        max-width: 440px;
      }
      .hist-title {
        font-size: 10px;
        letter-spacing: 3px;
        color: #2e5070;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .hist-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 200px;
        overflow-y: auto;
      }
      .hist-item {
        background: #0a1828;
        border: 1px solid #152540;
        border-radius: 10px;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        animation: fi 0.25s ease;
      }
      @keyframes fi {
        from {
          opacity: 0;
          transform: translateX(-8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .hist-num {
        font-family: "Share Tech Mono", monospace;
        font-size: 16px;
        letter-spacing: 3px;
        color: #b0d0f0;
      }
      .hist-t {
        font-size: 10px;
        color: #2e5070;
        letter-spacing: 1px;
      }
      .empty {
        font-size: 12px;
        color: #1a3050;
        letter-spacing: 1px;
        text-align: center;
        padding: 14px;
      }
    </style>
  </head>
  <body>
    <h1>🇧🇴 SERIE-BOL</h1>

    <!-- CAMERA -->
    <div class="cam-wrap" id="camWrap">
      <div class="ph" id="ph">
        <div class="ico">📷</div>
        <p>Toca "Abrir Cámara"<br />para empezar</p>
      </div>
      <video id="vid" autoplay playsinline muted style="display: none"></video>
      <canvas id="cap"></canvas>
      <div class="box" id="box" style="display: none">
        <div class="sline"></div>
        <div class="box-lbl">número de serie aquí</div>
      </div>
    </div>

    <!-- STATUS -->
    <div class="status" id="status">Inactivo</div>

    <!-- BUTTONS -->
    <button class="btn-start" id="btnStart" onclick="startCam()">
      📷 Abrir Cámara
    </button>
    <button
      class="btn-cap"
      id="btnCap"
      onclick="capturar()"
      style="display: none"
      disabled
    >
      📸 SACAR NÚMERO
    </button>

    <!-- RESULT -->
    <div class="result-wrap" id="resWrap">
      <div class="result-label">Número de serie</div>
      <div class="number" id="numOut">—</div>
    </div>

    <!-- HISTORY -->
    <div class="hist-wrap">
      <div class="hist-title">Últimas lecturas</div>
      <div class="hist-list" id="histList">
        <div class="empty">Sin lecturas aún</div>
      </div>
    </div>

    <script>
      let stream = null,
        worker = null,
        ocrReady = false;

      /* ── CAMERA ── */
      async function startCam() {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1920 },
              height: { ideal: 1080 },
            },
          });
          g("vid").srcObject = stream;
          g("vid").style.display = "block";
          g("ph").style.display = "none";
          g("box").style.display = "block";
          g("btnStart").style.display = "none";
          g("btnCap").style.display = "";
          setStatus("loading", "Cargando OCR...");
          await loadOCR();
        } catch (e) {
          setStatus("", "Error: " + e.message);
        }
      }

      /* ── LOAD OCR ── */
      async function loadOCR() {
        worker = Tesseract.createWorker({ logger: () => {} });
        await worker.load();
        await worker.loadLanguage("eng");
        await worker.initialize("eng");
        await worker.setParameters({
          tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 ",
          tessedit_pageseg_mode: Tesseract.PSM.SINGLE_BLOCK,
        });
        ocrReady = true;
        g("btnCap").disabled = false;
        setStatus("ready", "Listo — toca SACAR NÚMERO");
      }

      /* ── CAPTURAR ── */
      async function capturar() {
        if (!ocrReady) return;
        g("btnCap").disabled = true;
        setStatus("scanning", "Leyendo...");

        const vid = g("vid");
        const W = vid.videoWidth,
          H = vid.videoHeight;

        // Full frame canvas
        const src = document.createElement("canvas");
        src.width = W;
        src.height = H;
        src.getContext("2d").drawImage(vid, 0, 0, W, H);

        // Try 5 horizontal strips covering the whole bill
        // plus the green-box crop
        const zones = [
          [0.05, 0.3, 0.9, 0.4], // green box zone
          [0.05, 0.05, 0.9, 0.2], // top
          [0.05, 0.2, 0.9, 0.2], // upper
          [0.05, 0.55, 0.9, 0.2], // lower
          [0.05, 0.75, 0.9, 0.2], // bottom
          [0.0, 0.0, 1.0, 1.0], // full frame fallback
        ];

        let bestSerial = "",
          bestConf = 0;

        for (const [rx, ry, rw, rh] of zones) {
          const sx = Math.round(W * rx),
            sy = Math.round(H * ry);
          const sw = Math.round(W * rw),
            sh = Math.round(H * rh);

          // Process: grayscale + adaptive threshold + 3× upscale
          const processed = process(src, sx, sy, sw, sh);

          try {
            const { data } = await worker.recognize(processed);
            const serial = extract(data.text || "");
            if (serial && (data.confidence || 0) > bestConf) {
              bestSerial = serial;
              bestConf = data.confidence;
            }
          } catch (e) {
            /* skip */
          }

          if (bestSerial) break; // found it, stop scanning zones
        }

        if (bestSerial) {
          // SHOW BIG NUMBER
          const out = g("numOut");
          out.textContent = bestSerial;
          out.classList.add("show");
          setTimeout(() => out.classList.remove("show"), 500);
          g("resWrap").classList.add("found");
          addHistory(bestSerial);
          setStatus("ready", "Serie leída ✓ — puedes sacar otra");
        } else {
          g("numOut").textContent = "¿?";
          g("resWrap").classList.remove("found");
          setStatus("ready", "No detectado — intenta de nuevo");
        }

        g("btnCap").disabled = false;
      }

      /* ── IMAGE PROCESSING ── */
      function process(src, sx, sy, sw, sh) {
        const SCALE = 4;
        const c = document.createElement("canvas");
        c.width = sw * SCALE + 80;
        c.height = sh * SCALE + 80;
        const ctx = c.getContext("2d");
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(src, sx, sy, sw, sh, 40, 40, sw * SCALE, sh * SCALE);

        const img = ctx.getImageData(0, 0, c.width, c.height);
        const d = img.data,
          W = c.width,
          H = c.height;
        const gray = new Float32Array(W * H);

        for (let i = 0, p = 0; i < d.length; i += 4, p++)
          gray[p] = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];

        const BLK = 24;
        for (let py = 0; py < H; py++) {
          for (let px = 0; px < W; px++) {
            const p = py * W + px;
            let sum = 0,
              cnt = 0;
            for (let dy = -BLK; dy <= BLK; dy += 3) {
              for (let dx = -BLK; dx <= BLK; dx += 3) {
                const ny = py + dy,
                  nx = px + dx;
                if (ny >= 0 && ny < H && nx >= 0 && nx < W) {
                  sum += gray[ny * W + nx];
                  cnt++;
                }
              }
            }
            const val = gray[p] < sum / cnt - 10 ? 0 : 255;
            const i4 = p * 4;
            d[i4] = d[i4 + 1] = d[i4 + 2] = val;
            d[i4 + 3] = 255;
          }
        }
        ctx.putImageData(img, 0, 0);
        return c;
      }

      /* ── EXTRACT SERIAL ── */
      function extract(raw) {
        if (!raw) return "";
        const s = raw
          .toUpperCase()
          .replace(/[^A-Z0-9]/g, " ")
          .replace(/\s+/g, " ")
          .trim();

        // Bolivian format: 10 digits + letter  e.g. 2266791860A
        const tests = [
          /(\d{8,11})\s*([A-Z])/, // digits then letter — main format
          /([A-Z])\s*(\d{8,11})/, // letter then digits
          /\b[A-Z]{1,2}\d{6,9}\b/,
          /\b\d{7,11}\b/,
        ];

        for (const re of tests) {
          const m = s.match(re);
          if (!m) continue;
          if (m[2] !== undefined) {
            // Two groups
            const a = m[1],
              b = m[2];
            if (/^[A-Z]$/.test(b)) return a + b; // 2266791860A
            if (/^[A-Z]$/.test(a)) return a + b; // A2266791860
          }
          return m[0].replace(/\s/g, "");
        }
        return "";
      }

      /* ── HISTORY ── */
      function addHistory(serial) {
        const list = g("histList");
        if (list.querySelector(".empty")) list.innerHTML = "";
        const d = document.createElement("div");
        d.className = "hist-item";
        d.innerHTML = `<span class="hist-num">${serial}</span><span class="hist-t">${new Date().toLocaleTimeString("es-BO")}</span>`;
        list.prepend(d);
      }

      function setStatus(cls, txt) {
        const s = g("status");
        s.className = "status" + (cls ? " " + cls : "");
        s.textContent = txt;
      }

      function g(id) {
        return document.getElementById(id);
      }
    </script>
  </body>
</html>
